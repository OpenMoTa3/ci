name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Clone device port and build
        run: |
          git clone \
            https://gitlab.com/ubports/porting/community-ports/android9/oneplus-6/oneplus-enchilada-fajita.git

          cd oneplus-enchilada-fajita
          chmod +x build.sh
          ./build.sh

      - name: Upload all build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oneplus-enchilada-fajita-build
          path: |
            oneplus-enchilada-fajita/out/**
            oneplus-enchilada-fajita/workdir/tmp/partitions/**
            oneplus-enchilada-fajita/workdir/downloads/KERNEL_OBJ/arch/arm64/boot/**
            oneplus-enchilada-fajita/workdir/tmp/**/*.img
            oneplus-enchilada-fajita/workdir/tmp/**/*.tar.xz
          if-no-files-found: warn
          compression-level: 0
          retention-days: 14
