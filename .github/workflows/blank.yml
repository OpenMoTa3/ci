name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Clone source repository
        run: |
          git clone \
            https://gitlab.com/ubports/porting/community-ports/android9/oneplus-6/oneplus-enchilada-fajita.git \
            oneplus-enchilada-fajita

      - name: Build
        working-directory: oneplus-enchilada-fajita
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Archive entire cloned directory
        if: always()
        run: |
          tar -czf oneplus-enchilada-fajita-full.tar.gz \
            oneplus-enchilada-fajita

      - name: Upload archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oneplus-enchilada-fajita-full
          path: oneplus-enchilada-fajita-full.tar.gz
          compression-level: 0
          if-no-files-found: warn
          retention-days: 7
